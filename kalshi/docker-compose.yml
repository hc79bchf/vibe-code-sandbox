services:
  sandbox:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: openclaw-sandbox:snapshot-2026-03-13
    container_name: ${SANDBOX_NAME}-sandbox

    # Required for VSCode/Antigravity attach
    stdin_open: true
    tty: true

    # Start as root to fix Docker socket permissions, then drop to vscode
    user: root

    # Mount the project repo to /workspace in the container
    # Set PROJECT_PATH and SANDBOX_NAME in .env (see .env.example)
    volumes:
      - ${PROJECT_PATH:-.}:/workspace
      # Docker socket for controlling host Docker (DooD pattern)
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared vibecraft events (monitored by vibecraft-sandbox)
      - vibecraft-data:/home/vscode/.vibecraft/data
      # Mount host Claude credentials so container inherits existing login
      - ${HOME}/.claude:/home/vscode/.claude:cached

    # Networking: Allow outbound access (for pip/npm) but you can restrict this later
    networks:
      - sandbox-net

    # Entrypoint: fix Docker socket, sleep
    command: ["/bin/bash", "-c", "exec /home/vscode/entrypoint.sh"]

    # Environment variables for the AI context
    environment:
      - NODE_ENV=development
      - SANDBOX_NAME=${SANDBOX_NAME}
      # Vibecraft: notify server on host via Docker Desktop bridge
      - VIBECRAFT_WS_NOTIFY=http://host.docker.internal:${VIBECRAFT_PORT:-4003}/event
      # Remote Control: enable claude.ai/code remote access to this sandbox
      - ENABLE_REMOTE_CONTROL=${ENABLE_REMOTE_CONTROL:-false}
      # Fix: remote-control bridge needs explicit command path for npm-installed claude
      - CLAUDE_CODE_TEAMMATE_COMMAND=claude
      # Kalshi API keys (interpolated from host .env)
      - KALSHI_API_KEY=${KALSHI_API_KEY:-}
      - KALSHI_API_SECRET=${KALSHI_API_SECRET:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

volumes:
  vibecraft-data:
    external: true

networks:
  sandbox-net:
    driver: bridge
